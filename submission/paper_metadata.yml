# OpenReview / NeurIPS 2026 paper metadata
# Single source of truth for the form fields. When a value changes,
# update it here first, then copy/paste into the OR submission form.

paper:
  title: "When Better Retrieval Hurts: Context Coherence Drives Faithfulness in Retrieval-Augmented Generation"
  short_title: "The Coherence Paradox in RAG"
  venue: "NeurIPS 2026"
  track: "main"            # alt: "datasets_and_benchmarks"
  submission_type: "long"  # 9-page main + unlimited appendix per NeurIPS rules
  anonymous: true          # double-blind for review

authors:
  - name: "Saket Maganti"
    email: "REPLACE_WITH_REAL_EMAIL"
    affiliation: "Independent researcher"
    orcid: "REPLACE_OR_LEAVE_BLANK"
    is_corresponding: true

artifact_links:
  github: "https://github.com/Saket-Maganti/rag-hallucination-detection"
  hf_space: "https://huggingface.co/spaces/saketmgnt/sakkk"
  zenodo_doi: "TBD_AFTER_ZENODO_PUBLISH"
  release_tag: "v2.0.0"

keywords:
  primary:
    - retrieval-augmented generation
    - hallucination
    - context coherence
    - benchmarks
    - evaluation
  secondary:
    - natural language inference
    - faithfulness
    - mechanistic interpretability
    - large language models

tldr: >
  Better per-passage retrieval can reduce answer faithfulness by
  fragmenting context coherence; we name this the refinement paradox,
  introduce a generator-free retrieval-time diagnostic (CCS), and show
  a coherence-gated retriever (HCPC-v2) recovers faithfulness across
  SQuAD, PubMedQA, and frontier-scale generators (Llama-3.3-70B,
  GPT-OSS-120B).

